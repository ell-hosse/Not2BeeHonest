<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Not2BeeHonest</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="particles-canvas"></canvas>

<nav class="nav-glass">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="nav-logo-icon">🐝</span><span>Not2BeeHonest</span></a>
    <div class="nav-links">
      <a href="blog.html"    class="nav-link active">Blog</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="music.html"   class="nav-link">Music</a>
      <a href="admin.html"   class="nav-link nav-write">✦ Write</a>
    </div>
    <button class="nav-menu-btn" id="menuBtn">☰</button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="blog.html">Blog</a>
  <a href="gallery.html">Gallery</a>
  <a href="music.html">Music</a>
  <a href="admin.html">✦ Write</a>
</div>

<div class="page-wrapper">
  <div class="container">

    <div class="page-header reveal">
      <div class="section-label">// thoughts.log</div>
      <h1 class="section-title">Blog</h1>
      <p class="section-desc">Meanderings through nature, AI, science, and whatever else needs to be said.</p>
      <div class="divider"></div>
    </div>

    <!-- Search & Filters -->
    <div class="filter-bar reveal">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍  Search posts..." oninput="filterPosts()">
      <div class="tag-filters" id="tagFilters"></div>
    </div>

    <!-- Post Grid -->
    <div class="blog-grid" id="blogGrid">
      <div style="color:var(--t4);grid-column:1/-1;text-align:center;padding:3rem">Loading posts…</div>
    </div>

  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand"><span>🐝</span><span>Not2BeeHonest</span></div>
      <div class="footer-bottom"><span>Built with curiosity &amp; caffeine</span></div>
    </div>
  </div>
</footer>

<button class="scroll-top" aria-label="Scroll to top">↑</button>

<script src="js/particles.js"></script>
<script src="js/app.js"></script>
<script>
  let allPosts = [];
  let activeTag = 'all';

  async function init() {
    const data = await loadData('data/blogs.json');
    if (!data || !data.posts) { document.getElementById('blogGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p class="empty-state-text">No posts yet. <a href="admin.html">Write one!</a></p></div>'; return; }
    allPosts = data.posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    buildTagFilters();
    renderPosts(allPosts);
  }

  function buildTagFilters() {
    const tags = ['all', ...new Set(allPosts.flatMap(p => p.tags))];
    const el = document.getElementById('tagFilters');
    el.innerHTML = tags.map(t => `<button class="tag ${t==='all'?'active':''}" onclick="setTag('${t}')">${t}</button>`).join('');
  }

  function setTag(tag) {
    activeTag = tag;
    document.querySelectorAll('#tagFilters .tag').forEach(b => b.classList.toggle('active', b.textContent === tag));
    filterPosts();
  }

  function filterPosts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allPosts.filter(p => {
      const matchTag = activeTag === 'all' || p.tags.includes(activeTag);
      const matchQ   = !q || p.title.toLowerCase().includes(q) || p.excerpt.toLowerCase().includes(q) || p.tags.some(t => t.includes(q));
      return matchTag && matchQ;
    });
    renderPosts(filtered);
  }

  function renderPosts(posts) {
    const el = document.getElementById('blogGrid');
    if (!posts.length) { el.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🔍</div><p class="empty-state-text">No posts match your search.</p></div>'; return; }
    el.innerHTML = posts.map(p => `
      <a href="post.html?id=${p.id}" class="post-card" style="text-decoration:none">
        <div class="post-cover">
          ${p.src ? `<img src="${p.src}" alt="${p.title}">` : `<div class="post-cover-placeholder">${p.coverEmoji || '📖'}</div>`}
        </div>
        <div class="post-body">
          <div class="post-meta">
            <span class="post-date">${fmtDate(p.date)}</span>
            <span class="post-read-time">· ${p.readTime || readTime(p.content)} min read</span>
          </div>
          <h2 class="post-title">${p.title}</h2>
          <p class="post-excerpt">${p.excerpt}</p>
          <div class="post-tags">${(p.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </a>`).join('');
  }

  init();
</script>
</body>
</html>
