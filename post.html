<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Not2BeeHonest</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="post-progress" id="readProgress" style="width:0%"></div>

<nav class="nav-glass">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="nav-logo-icon">🐝</span><span>Not2BeeHonest</span></a>
    <div class="nav-links">
      <a href="blog.html"    class="nav-link active">Blog</a>
      <a href="gallery.html" class="nav-link">Gallery</a>
      <a href="music.html"   class="nav-link">Music</a>
      <a href="admin.html"   class="nav-link nav-write">✦ Write</a>
    </div>
    <button class="nav-menu-btn" id="menuBtn">☰</button>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="blog.html">Blog</a>
  <a href="gallery.html">Gallery</a>
  <a href="music.html">Music</a>
  <a href="admin.html">✦ Write</a>
</div>

<div class="page-wrapper">
  <article class="post-full" id="postContent">
    <div style="text-align:center;padding:4rem;color:var(--t4)">Loading…</div>
  </article>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand"><span>🐝</span><span>Not2BeeHonest</span></div>
      <div class="footer-bottom"><span>Built with curiosity &amp; caffeine</span></div>
    </div>
  </div>
</footer>

<button class="scroll-top" aria-label="Scroll to top">↑</button>

<script src="js/particles.js"></script>
<script src="js/app.js"></script>
<script>
  // Reading progress bar
  window.addEventListener('scroll', () => {
    const doc = document.documentElement;
    const pct = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
    document.getElementById('readProgress').style.width = Math.min(pct, 100) + '%';
  });

  async function loadPost() {
    const id = getParam('id');
    const data = await loadData('data/blogs.json');
    const el = document.getElementById('postContent');

    if (!data || !id) { notFound(el); return; }
    const post = data.posts.find(p => p.id === id || p.slug === id);
    if (!post) { notFound(el); return; }

    document.title = post.title + ' — Not2BeeHonest';

    const html = typeof marked !== 'undefined' ? marked.parse(post.content || '') : post.content.replace(/\n/g, '<br>');

    el.innerHTML = `
      <div class="post-full-header reveal">
        <a href="blog.html" style="display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--t4);margin-bottom:1.5rem;text-decoration:none;font-family:var(--font-mono)">← Back to Blog</a>
        ${post.cover
          ? `<img src="${post.cover}" alt="${post.title}" style="width:100%;max-height:420px;object-fit:cover;border-radius:var(--r-lg);margin-bottom:1.5rem;border:1px solid var(--border)">`
          : `<div style="font-size:3rem;margin-bottom:1rem">${post.coverEmoji || '📖'}</div>`}
        <h1 class="post-full-title">${post.title}</h1>
        <div class="post-full-meta">
          <span class="post-date">${fmtDate(post.date)}</span>
          <span>· ${post.readTime || readTime(post.content)} min read</span>
        </div>
        <div class="post-tags" style="margin-bottom:1.5rem">
          ${(post.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="divider"></div>
      </div>
      <div class="md-content reveal">${html}</div>
      <div class="reveal" style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem">
        <a href="blog.html" class="btn btn-ghost">← All Posts</a>
      </div>`;
    if (typeof setupReveal === 'function') setupReveal(el);
  }

  function notFound(el) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>Post not found. <a href="blog.html">Back to blog</a></p></div>';
  }

  loadPost();
</script>
</body>
</html>
